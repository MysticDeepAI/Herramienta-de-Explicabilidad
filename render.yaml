# render.yaml — Render Blueprint
# https://docs.render.com/blueprint-spec

services:
  - type: web
    name: profile-xai-api
    runtime: python
    plan: free            # cámbialo a "starter" si necesitas más recursos
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: UPLOAD_DIR
        value: /tmp/uploads
      - key: CORS_ORIGIN
        value: "*"
      - key: GCP_PROJECT_ID
        sync: false       # se configura manualmente en el dashboard de Render
      - key: GCP_LOCATION
        value: "us-central1"
      - key: GEMINI_API_KEY
        sync: false       # se configura manualmente en el dashboard de Render
      - key: GEMINI_MODEL
        value: "gemini-2.5-flash"
      - key: GOOGLE_APPLICATION_CREDENTIALS
        sync: false       # ruta al JSON de Service Account (si aplica)
